services:
  - type: web
    name: lifedashboard-api
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lifedashboard-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: ${RENDER_EXTERNAL_URL}
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "8000"

  - type: pserv
    name: lifedashboard-db
    ipAllowList: []
    plan: free
    region: oregon
